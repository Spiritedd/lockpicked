<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lockpicked.org</title>
  <style>
    :root {
      --bg: #FAFAF8;
      --text: #242622;
      --muted: #70756d;
      --line: #e6e7e1;
      --soft: #f1f2ee;
      --card: #ffffff;
      --accent: #84b067;
      --accent-dark: #5f8846;
      --shadow: 0 18px 50px rgba(36, 38, 34, 0.08);
      --shadow-soft: 0 12px 30px rgba(36, 38, 34, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      padding: 28px 0;
    }

    .logo {
      flex: 0 0 auto;
      font-size: 1.38rem;
      font-weight: 760;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 26px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 560;
    }

    .nav-links a {
      transition: color 180ms ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 22px;
      border: 1px solid transparent;
      border-radius: 999px;
      background: var(--text);
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
